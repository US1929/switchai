<nav>
  <div style="max-width:1040px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;">
    <a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
      <img src="/img/logo-76.png" alt="SwitchAI" width="38" height="38" style="border-radius:10px;box-shadow:0 4px 12px rgba(245,158,11,0.3);" />
      <span style="font-size:18px;font-weight:800;color:#f1f5f9;letter-spacing:-0.5px;">Switch<span style="color:#f59e0b;">AI</span></span>
    </a>
    <div style="display:flex;gap:4px;align-items:center;">
      <a href="/" class="nav-link" data-page="home">Confronta</a>
      <a href="/come-funziona" class="nav-link" data-page="come-funziona">Come funziona</a>
      <a href="/per-llm" class="nav-link" data-page="per-llm">Per LLM</a>
      <a href="/faq.html" class="nav-link" data-page="faq">FAQ</a>
    </div>
  </div>
</nav>

<style>
  .nav-link {
    padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
    color: #94a3b8; text-decoration: none; transition: all 0.15s;
  }
  .nav-link:hover { color: #f1f5f9; background: rgba(255,255,255,0.04); }
  .nav-link.active { color: #f1f5f9 !important; background: rgba(255,255,255,0.06); }
</style>

<script>
  // Attiva il link corrispondente alla pagina corrente
  (function() {
    var path = location.pathname;
    var links = document.querySelectorAll('.nav-link');
    links.forEach(function(link) {
      var page = link.getAttribute('data-page');
      if (page === 'home' && (path === '/' || path === '')) link.classList.add('active');
      else if (page === 'come-funziona' && path.startsWith('/come-funziona')) link.classList.add('active');
      else if (page === 'per-llm' && path.startsWith('/per-llm')) link.classList.add('active');
      else if (page === 'faq' && path.startsWith('/faq')) link.classList.add('active');
    });
  })();
</script>
